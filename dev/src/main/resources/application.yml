server:
  port: 8080
  servlet:
    context-path: /api
spring:
  application:
    name: student-archive

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/studentrecordmanagementsystem
    username: root
    password: root
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000


# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.student.archive.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# PageHelper 分页配置
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

# JWT 配置
jwt:
  secret: student-archive-management-system-jwt-secret-key-2024
  expiration: 86400000

# 文件存储路径
file:
  upload-path: ./uploads/

# 阿里云 OSS 配置
oss:
  region: cn-beijing
  bucket: luce5in3-buket
  endpoint: https://oss-cn-beijing.aliyuncs.com
  base-url: https://luce5in3-buket.oss-cn-beijing.aliyuncs.com
  prefix-archive: Archivefiles/
  prefix-image: SRMS_Image/
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}

# 日志配置
logging:
  level:
    com.student.archive: debug
    org.springframework.security: info
